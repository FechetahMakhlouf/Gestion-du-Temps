<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="frontend/styles.css">
</head>

<body>

    <!-- AUTH PAGE -->
    <div id="auth-page">
        <div class="auth-box">
            <div class="auth-logo">
                <div class="logo-title">جدول</div>
                <div class="logo-sub">Jadwal</div>
                <div class="gold-line"></div>
            </div>
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
                    <button class="auth-tab" onclick="switchAuthTab('register')">Inscription</button>
                </div>

                <div id="login-form" class="auth-form">
                    <div class="form-group">
                        <input class="form-input" id="login-email" type="email" placeholder=" ">
                        <label class="form-label" for="login-email">Email</label>
                    </div>
                    <div class="form-group">
                        <input class="form-input" id="login-password" type="password" placeholder=" ">
                        <label class="form-label" for="login-password">Mot de passe</label>
                    </div>
                    <button class="btn-primary" onclick="doLogin()">Se connecter →</button>
                </div>

                <div id="register-form" class="auth-form" style="display:none">
                    <div class="form-group">
                        <input class="form-input" id="reg-name" type="text" placeholder=" ">
                        <label class="form-label" for="reg-name">Nom complet</label>
                    </div>
                    <div class="form-group">
                        <input class="form-input" id="reg-email" type="email" placeholder=" ">
                        <label class="form-label" for="reg-email">Email</label>
                    </div>
                    <div class="form-group">
                        <input class="form-input" id="reg-password" type="password" placeholder=" ">
                        <label class="form-label" for="reg-password">Mot de passe</label>
                    </div>
                    <div id="reg-msg"></div>
                    <button class="btn-primary" onclick="doRegister()">Créer mon compte →</button>
                </div>
            </div>
        </div>
    </div>
    <!-- APP PAGE -->
    <div id="app-page">
        <button class="mobile-nav-toggle" onclick="toggleSidebar()">☰</button>
        <div class="app-layout">
            <!-- Sidebar -->
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-logo">جدول Jadwal</div>
                    <div class="sidebar-user" id="sidebar-username">—</div>
                </div>
                <div class="sidebar-nav">
                    <button class="nav-item active" onclick="showPanel('schedule')">
                        <span class="nav-icon">📅</span> Mon Emploi du Temps
                    </button>
                    <button class="nav-item" onclick="showPanel('subjects')">
                        <span class="nav-icon">📚</span> Mes Matières
                    </button>
                    <button class="nav-item" onclick="showPanel('timeslots')">
                        <span class="nav-icon">🕐</span> Créneaux Horaires
                    </button>
                    <button class="nav-item" onclick="showPanel('autogen')">
                        <span class="nav-icon">⚡</span> Génération Auto
                    </button>
                </div>
                <div class="sidebar-footer">
                    <button class="nav-item" onclick="doLogout()">
                        <span class="nav-icon">🚪</span> Déconnexion
                    </button>
                </div>
            </nav>
        </div>
    </div>
    <script src="frontend/script.js"></script>
</body>

</html>
